name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ════════════════════════════════════════════════════════════════════
jobs:

  # ── Stage 1: Style Check (Linux Docker) ───────────────────────────
  style:
    name: Style Check (clang-tidy + clang-format)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install LLVM 22 — same version as local dev (avoids format diffs)
      - name: Install LLVM 22 + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake make g++ wget gnupg ca-certificates
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-tidy-22 clang-format-22
          sudo ln -sf /usr/bin/clang-tidy-22   /usr/local/bin/clang-tidy
          sudo ln -sf /usr/bin/clang-format-22 /usr/local/bin/clang-format

      # Configure without tests — only need compile_commands.json
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=OFF

      - name: clang-tidy
        run: |
          find src -name "*.cpp" | xargs clang-tidy \
            -p build \
            --config-file=.clang-tidy \
            --warnings-as-errors="*"

      - name: clang-format
        run: |
          find src include test \( -name "*.cpp" -o -name "*.hpp" \) | \
            xargs clang-format --dry-run --Werror

  # ── Stage 2: Test on Linux (Docker image) ─────────────────────────
  test-linux:
    name: Test — Linux (Docker)
    runs-on: ubuntu-latest
    needs: style

    steps:
      - uses: actions/checkout@v4

      # Cache Catch2 download across runs
      - name: Cache Catch2
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: catch2-linux-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: catch2-linux-

      # Cache Docker layers for faster image rebuild
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Linux Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.linux
          load: true
          tags: event-system:linux
          cache-from: type=gha,scope=linux
          cache-to:   type=gha,scope=linux,mode=max

      - name: Run tests inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build/_deps:/workspace/build/_deps \
            event-system:linux \
            sh -c "ctest --test-dir build --output-on-failure -V"

  # ── Stage 3: Test on Windows (MSYS2/UCRT64 native — same env as local dev) ──
  test-windows:
    name: Test — Windows (MinGW / MSYS2)
    runs-on: windows-2022
    needs: style

    # All steps run inside the MSYS2 shell so cmake/make/ctest are on PATH
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false          # skip full mirror sync to keep CI fast
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            make

      # Cache Catch2 download
      - name: Cache Catch2
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: catch2-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: catch2-windows-

      - name: Configure CMake
        run: |
          cmake -B build \
            -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -V
